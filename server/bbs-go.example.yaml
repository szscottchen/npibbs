Port: 8082 # 端口
# 网站BaseURL配置说明：
# 开发环境：使用完整的服务地址，确保图片URL可以正确访问
#   BaseURL: http://localhost:8082
# 生产环境：可以配置为完整域名或根路径"/"
#   完整域名示例 -> BaseURL: https://yourdomain.com
#   根路径示例 -> BaseURL: /
BaseURL: /
IpDataPath: # IP数据文件，默认读取当前目录下ip2region.xdb文件，最新数据文件请从这里下载：https://github.com/lionsoul2014/ip2region/tree/master/data
AllowedOrigins:
  - "*"
Installed: false # 是否已完成安装

# 企业微信配置（存储在系统配置表中）
WeCom:
  Enabled: true
  CorpId: 根据企业微信配置获取
  Secret: 根据企业微信配置获取
  AgentId: 根据企业微信配置获取
  RedirectUri: 根据企业微信配置获取


# 日志配置
Logger:
  Filename: /app/bbs-go/logs/tkdev.log   # 日志文件的位置
  MaxSize: 100                      # 文件最大尺寸（以MB为单位）
  MaxAge: 10                        # 保留旧文件的最大天数
  MaxBackups: 10                    # 保留的最大旧文件数量


# 数据库连接
# Docker环境：如果数据库在宿主机，使用 host.docker.internal:3306
# 或者使用主机网络模式，直接连接 localhost:3306
DB:
  Url: username:password@tcp(localhost:3306)/bbsgo_db?charset=utf8mb4&parseTime=True&multiStatements=true&loc=Local
  MaxIdleConns: 50
  MaxOpenConns: 200

# 上传配置
Uploader:
  # 启用上传方式
  Enable: Oss
  # 阿里云oss配置
  AliyunOss:
    Host:              # 阿里云OSS资源外网访问地址
    Bucket:            # 阿里云OSS bucket名称
    Endpoint:          # 阿里云OSS Endpoint
    AccessId:          # 阿里云OSS accessID
    AccessSecret:      # 阿里云OSS accessKey
    StyleSplitter:     # 阿里云oss图片样式分隔符
    StyleAvatar:       # 头像图片样式名称
    StylePreview:      # 预览图片样式名称
    StyleSmall:        # 小图样式名称
    StyleDetail:       # 详情图片样式名称
  TencentCos:
    Bucket:
    Region:
    SecretId:
    SecretKey:

# 邮件服务器配置，用于邮件通知
Smtp:
  Host:       # smtp服务地址，请设置成你自己的，例如：smtp.qq.com
  Port:       # smtp服务端口，请设置成你自己额，例如：25
  Username:   # 请配置成你自己的
  Password:   # 请配置成你自己的
  SSL: true

# 百度SEO相关配置
# 文档：https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title14
BaiduSEO:
  Site:
  Token:

# 神马搜索SEO相关
# 文档：https://zhanzhang.sm.cn/open/mip
SmSEO:
  Site:
  UserName:
  Token:

# search
Search:
  IndexPath: # 索引路径

AI:
	Enabled: true      # 是否启用AI服务
	Provider:      # AI服务提供商：openai、azure、deepseek
	APIKey:        # API密钥
	Model:         # 模型名称
	Endpoint:      # 端点地址（Azure专用）
	APIVersion:    # API版本（Azure专用）