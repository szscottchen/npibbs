services:
  tkdev:
    container_name: tkdevbbs
    build: .
    image: tkdev:latest
    volumes:
      - ./data:/app/bbs-go/data
      - ./logs:/app/bbs-go/logs
    environment:
      BBSGO_ENV: prod
      # 连接外部数据库配置，根据实际数据库地址修改
      DB_HOST: localhost  # 或数据库服务器IP
      DB_PORT: 3306
      DB_USER: bbsgo
      DB_PASSWORD: Tk*935920
      DB_NAME: bbsgo_dev
    ports:
      - 8082:8082  # 后端API端口
      - 3000:3000  # 前台静态文件端口
    restart: on-failure
    # 如需连接外部数据库，可能需要网络配置
    network_mode: host  # 使用主机网络连接本地数据库
