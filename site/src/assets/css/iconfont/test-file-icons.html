<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>文件类型图标测试</title>
  <link rel="stylesheet" href="iconfont.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .icon-test {
      display: inline-block;
      margin: 10px;
      text-align: center;
      width: 100px;
    }
    .icon {
      font-size: 32px;
      margin-bottom: 5px;
    }
    .file-icon {
      font-family: "iconfont" !important;
      font-size: 32px;
      font-style: normal;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <h1>文件类型图标测试</h1>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-word"></div>
    <div>Word (.doc/.docx)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-excel"></div>
    <div>Excel (.xls/.xlsx)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-ppt"></div>
    <div>PPT (.ppt/.pptx)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-pdf"></div>
    <div>PDF (.pdf)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-text"></div>
    <div>Text (.txt)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file-zip"></div>
    <div>ZIP (.zip/.rar)</div>
  </div>
  
  <div class="icon-test">
    <div class="icon iconfont icon-file"></div>
    <div>默认文件图标</div>
  </div>
  
  <h2>使用file-icon类测试</h2>
  
  <div class="icon-test">
    <div class="file-icon iconfont icon-file-word"></div>
    <div>Word + file-icon</div>
  </div>
  
  <div class="icon-test">
    <div class="file-icon iconfont icon-file-excel"></div>
    <div>Excel + file-icon</div>
  </div>
  
</body>
</html>
